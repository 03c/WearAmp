name: Deploy to Google Play

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy to Google Play (Internal Track)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Decode the base64-encoded keystore secret into a file that Gradle can use.
      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/app/release.jks"

      # VERSION_CODE combines the run number and run attempt so that both new
      # merges and workflow re-runs always produce a strictly higher code than
      # any previous upload (Play Console rejects duplicate or lower codes).
      - name: Build Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number * 10 + github.run_attempt }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@a9f9c9a7769533df15f499a3e9bbf2878f79e7d1 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wearamp
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
