name: Deploy to Google Play

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-play-store
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Google Play (Internal Track)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Debug keystore secret
        run: |
          VAL="${{ secrets.KEYSTORE_BASE64 }}"
          echo "Length: ${#VAL}"
          echo "First 10: ${VAL:0:10}"
          echo "Last 10: ${VAL: -10}"
          echo "Has newlines: $(echo "$VAL" | wc -l)"

      - name: Decode keystore
        run: printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/app/release.jks"

      - name: Compute version code
        run: echo "VERSION_CODE=$(( ${{ github.run_number }} * 1000 + ${{ github.run_attempt }} ))" >> "$GITHUB_ENV"

      - name: Build Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wearamp
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
