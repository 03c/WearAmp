name: Deploy to Google Play

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy to Google Play (Internal Track)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Decode the base64-encoded keystore secret into a file that Gradle can use.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/app/release.jks"

      # VERSION_CODE uses the ever-increasing GitHub run number so every build
      # uploaded to the Play Console has a strictly higher code than the last.
      - name: Build Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wearamp
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
