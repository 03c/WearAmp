title: WearAmp
description: Stream your Plex music library directly from your Wear OS watch. No phone required.
url: "https://03c.github.io"
baseurl: "/WearAmp"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude app/build files from Jekyll processing
exclude:
  - Gemfile.lock
  - README.md
  - vendor

# Collections for docs
collections:
  docs:
    output: true
    permalink: /docs/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "_docs"
    values:
      layout: page
  - scope:
      path: "privacy"
    values:
      layout: page
