# The MAJOR.MINOR portion of the version shown in the Play Store and About screens.
# Bump this manually when you ship a significant update (e.g. 1.0 -> 1.1 or 2.0).
# The full version name is computed as MAJOR.MINOR.RUN_NUMBER in CI
# (e.g. 1.0.42), giving every release a unique, clean version.
VERSION_MAJOR_MINOR=1.0
